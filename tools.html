    <style>
        .vpn-card { background:#1a1a1a; padding:15px; border-radius:12px; text-align:center; border:1px solid #333; }
        .vpn-btn { width:100%; padding:10px; background:#fbbf24; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px; }
        .num-item { background:#000; padding:15px; border:1px solid #333; border-radius:10px; display:flex; justify-content:space-between; align-items:center; }
        .buy-btn { background:#00ff88; color:#000; padding:8px 15px; text-decoration:none; border-radius:5px; font-weight:bold; font-size:0.8em; }
    </style>

    <script>
        // VPN TRIAL LOGIC
        let timeLeft = 1800; // 30 minutes in seconds
        let timerRunning = false;

        function connectVPN(country) {
            if (!timerRunning) {
                timerRunning = true;
                alert("VPN Tunnel Established: " + country + ". Your 30-minute free trial has started.");
                startTimer();
            } else if (timeLeft <= 0) {
                alert("TRIAL EXPIRED. Please purchase a subscription for " + country + " to continue.");
                window.location.href = "https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=lomalianorman@gmail.com&amount=5.00&item_name=VPN-" + country;
            } else {
                alert("Switching tunnel to " + country + "...");
            }
        }

        function startTimer() {
            const clock = document.getElementById('timer-clock');
            const interval = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                clock.innerText = mins + ":" + (secs < 10 ? "0" : "") + secs;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    clock.innerText = "EXPIRED";
                    document.querySelectorAll('.vpn-btn').forEach(b => b.innerText = "BUY ACCESS");
                }
                timeLeft--;
            }, 1000);
        }

        // PHONE NUMBER LOGIC
        function purchaseNumber() {
            const country = document.getElementById('country-select').value;
            const results = document.getElementById('number-results');
            results.innerHTML = '<p style="text-align:center;">Searching Secure Vault...</p>';
            
            setTimeout(() => {
                let randomNum = Math.floor(Math.random() * 9000000) + 1000000;
                results.innerHTML = `
                    <div class="num-item">
                        <span><b>${country}:</b> +${country == 'USA' ? '1' : '44'}${randomNum}</span>
                        <div>
                            <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=lomalianorman@gmail.com&amount=2.00&item_name=Phone-Weekly-${country}" class="buy-btn">$2/Wk</a>
                            <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=lomalianorman@gmail.com&amount=7.00&item_name=Phone-Monthly-${country}" class="buy-btn">$7/Mo</a>
                        </div>
                    </div>
                `;
            }, 1500);
        }
    </script>
