
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EAGLE X COMMAND</title>
        <style>
            :root { --gold: #fbbf24; --green: #00ff88; --dark: #000; --panel: #0a0a0a; }
            body, html { margin: 0; padding: 0; height: 100%; background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
            
            /* TOP COMMAND HEADER */
            header { 
                height: 60px; background: #000; border-bottom: 2px solid var(--gold); 
                display: flex; align-items: center; justify-content: center; z-index: 1000; position: relative; 
            }
            header h1 { letter-spacing: 10px; color: var(--gold); margin: 0; font-size: 1.5em; }

            /* ENGINE NAVIGATION */
            .nav-bar { 
                display: flex; background: #111; height: 50px; align-items: center; 
                justify-content: center; gap: 20px; border-bottom: 1px solid #333;
            }
            .nav-item { 
                background: none; border: 1px solid #444; color: #888; padding: 5px 15px; 
                border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: bold; 
            }
            .nav-item.active { color: var(--gold); border-color: var(--gold); background: rgba(251,191,36,0.1); }

            /* THE MASKING ZONE (THE SUIT) */
            .main-view { width: 100%; height: calc(100vh - 110px); position: relative; background: #000; }
            
            /* Hidden iframe container to 'Kidnap' Nano Banana and AI */
            .engine-frame { 
                width: 100%; height: calc(100% + 70px); border: none; 
                position: absolute; top: -70px; /* This cuts off their logo/header */
                display: none; 
            }
            .engine-frame.active { display: block; }

            /* INTERNAL DASHBOARD STYLES */
            .internal-ui { padding: 20px; display: none; overflow-y: auto; height: 100%; }
            .internal-ui.active { display: block; }
            .card { background: var(--panel); border: 1px solid #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
            .btn { background: var(--green); color: #000; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        </style>
    </head>
    <body>
        <header><h1>🦅 EAGLE X COMMAND</h1></header>

        <div class="nav-bar">
            <button class="nav-item active" onclick="showEngine('nano', this)">AI LAB (NANO)</button>
            <button class="nav-item" onclick="showEngine('brain', this)">EAGLE BRAIN (GROK)</button>
            <button class="nav-item" onclick="showEngine('sms', this)">PHONE VAULT</button>
            <button class="nav-item" onclick="showEngine('apps', this)">GAME VAULT</button>
        </div>

        <div class="main-view">
            <iframe id="nano-engine" class="engine-frame active" src="https://nanobanana.online/"></iframe>

            <iframe id="brain-engine" class="engine-frame" src="https://deepai.org/chat"></iframe>

            <div id="sms-ui" class="internal-ui">
                <div class="card" style="border-color: var(--green);">
                    <h3 style="color:var(--green);">📡 LIVE SMS NODE: +19789724462</h3>
                    <div style="max-height: 300px; overflow-y: auto;"><p style='color:#666;'>Node Active: Waiting for traffic...</p></div>
                    <button class="btn" style="margin-top:15px;" onclick="location.reload()">SYNC LIVE NODE</button>
                </div>
                <div class="card">
                    <h3 style="color:var(--gold);">📱 PROVISION NEW NUMBER</h3>
                    <input type="text" placeholder="Country Code" style="width:100%; padding:10px; background:#111; color:#fff; border:1px solid #333; border-radius:5px;">
                    <button class="btn" style="background:var(--gold); margin-top:10px;">QUERY REGISTRY</button>
                </div>
            </div>

            <div id="apps-ui" class="internal-ui">
                <div class="card">
                    <h2 style="color:var(--gold);">🎮 MASTER GAME REPOSITORY</h2>
                    <div style="background:#111; padding:15px; border-radius:10px; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <b>GTA San Andreas</b><br><small style="color:#555;">v2.10 | Verified APK</small>
                        </div>
                        <a href="https://archive.org/download/gtasa_202105/GTA%20San%20Andreas.apk" download style="background:var(--gold); color:#000; padding:10px 20px; border-radius:5px; text-decoration:none; font-weight:bold;">FETCH</a>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function showEngine(type, btn) {
                // Deactivate all
                document.querySelectorAll('.engine-frame, .internal-ui').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                
                // Activate selected
                btn.classList.add('active');
                if(type === 'nano') document.getElementById('nano-engine').classList.add('active');
                if(type === 'brain') document.getElementById('brain-engine').classList.add('active');
                if(type === 'sms') document.getElementById('sms-ui').classList.add('active');
                if(type === 'apps') document.getElementById('apps-ui').classList.add('active');
            }
        </script>
    </body>
    </html>
