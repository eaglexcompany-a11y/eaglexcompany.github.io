<!DOCTYPE html>
<html>
<head>
    <title>EagleX Game Station</title>
    <style>
        body { background: #000; color: #fbbf24; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { border: 2px solid #fbbf24; padding: 20px; display: inline-block; border-radius: 15px; }
        .btn { background: #00ff88; color: #000; padding: 15px 30px; text-decoration: none; font-weight: bold; border-radius: 10px; display: block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1 id="title">Loading Game...</h1>
        <p>This high-graphic mobile game requires an APK installation.</p>
        <p>Status: <b>Verified Legit Business</b></p>
        <a id="downloadBtn" href="#" class="btn">INSTALL & PLAY NOW</a>
        <br>
        <a href="games.html" style="color:#888;">Go Back</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('title').innerText = "Playing: " + urlParams.get('game');
        document.getElementById('downloadBtn').href = urlParams.get('url');
    </script>
</body>
</html>
